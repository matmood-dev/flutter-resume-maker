name: resume_ai
description: "AI-powered resume builder Flutter application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  supabase_flutter: ^2.8.4
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  pdf: ^3.11.2
  printing: ^5.13.4
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
